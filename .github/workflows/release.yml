name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Fyne CLI
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - name: Build release bundle
        run: ./build-release.sh "${{ steps.version.outputs.value }}"

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.xz > sha256sums.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/*.tar.xz dist/sha256sums.txt --clobber
          else
            gh release create "$VERSION" dist/*.tar.xz dist/sha256sums.txt \
              --title "$VERSION" \
              --notes "Install with: curl -fsSL https://raw.githubusercontent.com/ibanks42/winboat-helper/main/install.sh | bash"
          fi
